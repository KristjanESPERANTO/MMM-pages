name: Bug Report
description: File a bug report.
title: "[BUG] "
labels: 
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us out!
        **Describe the bug**
        A clear and concise description of what the bug is.
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Steps to reproduce the behavior:
        (Please paste any information on reproducing the issue, for example:)
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        If applicable, add screenshots to help explain your problem. If you believe you
        have aptly described your issue in words, feel free to ignore/delete this section.
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: This can be obtained by running `node --version`
  - type: dropdown
    id: updated-core
    attributes:
      label: Have you updated to the latest MagicMirror core?
      options:
        - yes
        - no
  - type: textarea
    id: config-file
    attributes:
      label: Config file
      description: "Please post the relevant part of your config file here:"
    validations:
      required: true
  - type: textarea
    id: console-errors
    attributes:
      label: Console errors
      description: |
        Please post any errors you see about MMM-pages in the console (Hit F12 > Console when the MagicMirror window is focused), or write **None** if there aren't any:
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.

